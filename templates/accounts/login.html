{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — MindMate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d0d1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .page-wrapper {
      display: flex;
      width: 100%;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 32px 64px rgba(0,0,0,0.5);
      position: relative;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-dot {
      width: 10px; height: 10px;
      background: #8b5cf6;
      border-radius: 50%;
    }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .heading {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subheading {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 32px;
    }

    .error-box {
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      font-size: 0.83rem;
      color: #f87171;
      margin-bottom: 20px;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 16px;
    }

    .field { display: flex; flex-direction: column; gap: 8px; }

    .field-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .field label {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
    }

    .field input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 13px 16px;
      color: #fff;
      font-size: 0.92rem;
      outline: none;
      transition: all 0.2s;
      width: 100%;
    }

    .field input:focus {
      border-color: rgba(139,92,246,0.6);
      background: rgba(139,92,246,0.06);
    }

    .field input::placeholder { color: rgba(255,255,255,0.2); }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 46px; }

    .pw-toggle {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: rgba(255,255,255,0.3);
      cursor: pointer; padding: 0;
      display: flex; align-items: center;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: rgba(255,255,255,0.7); }

    .forgot {
      font-size: 0.78rem;
      color: #8b5cf6;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .forgot:hover { opacity: 0.75; }

    .remember {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 24px;
      cursor: pointer;
    }
    .remember input[type="checkbox"] {
      accent-color: #8b5cf6;
      width: 15px; height: 15px;
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 24px rgba(124,58,237,0.35);
    }
    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(124,58,237,0.45);
    }

    .divider {
      text-align: center;
      color: rgba(255,255,255,0.2);
      font-size: 0.78rem;
      margin: 24px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    /* Social buttons */
    .socials {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
      font-family: 'Segoe UI', sans-serif;
    }
    .btn-social:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-2px);
    }

    .btn-create {
      width: 100%;
      padding: 13px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .btn-create:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-color: rgba(255,255,255,0.18);
    }

    .footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 0.76rem;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

<div class="page-wrapper">
  <div class="card">

    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">MindMate</span>
    </div>

    <h1 class="heading">Welcome back</h1>
    <p class="subheading">Sign in to your quiet corner on campus</p>

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}

      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <div class="fields">
        <div class="field">
          <label>Email address</label>
          <input type="email" name="email" placeholder="you@university.edu" autocomplete="email" required />
        </div>

        <div class="field">
          <div class="field-row">
            <label>Password</label>
            <a href="{% url 'forget_password' %}" class="forgot">Forgot password?</a>
          </div>
          <div class="pw-wrap">
            <input type="password" name="password" id="pw" placeholder="Your password" autocomplete="current-password" required />
            <button class="pw-toggle" onclick="togglePw()" type="button">
              <svg id="eye-icon" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <label class="remember">
        <input type="checkbox" name="remember" checked /> Keep me signed in for 30 days
      </label>

      <button type="submit" class="btn-submit">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
        </svg>
        Sign In
      </button>
    </form>

    <!-- Social Login Buttons -->
    <div class="divider">or continue with</div>

    <div class="socials">
      <a href="{% provider_login_url 'google' %}" class="btn-social">
        <svg width="17" height="17" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </a>

      <a href="{% provider_login_url 'github' %}" class="btn-social">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
        </svg>
        GitHub
      </a>
    </div>

    <!-- Register Button -->
    <div class="divider">or</div>

    <button class="btn-create" onclick="location.href='/accounts/register/'">
      Create your free account
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </button>

    <p class="footer-note">Your data is private & secure 🔒</p>

  </div>
</div>

<script>
  function togglePw() {
    const pw = document.getElementById('pw');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }
</script>

</body>
</html>
