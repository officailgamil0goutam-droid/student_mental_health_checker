<!-- Replace the existing fields + submit button section in login.html with this -->
<!-- The form needs method POST and csrf_token to work with Django -->

<form method="POST" action="{% url 'login' %}">
  {% csrf_token %}

  <!-- show error if login failed -->
  {% if error %}
  <div style="padding:10px 14px;border-radius:10px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);font-size:.82rem;color:#f87171;margin-bottom:16px;">
    {{ error }}
  </div>
  {% endif %}

  <div class="fields">
    <div class="field">
      <label>Email address</label>
      <input type="email" name="email" placeholder="you@university.edu" autocomplete="email" required />
    </div>
    <div class="field">
      <div class="field-row">
        <label>Password</label>
        <a href="{% url 'forget_password' %}" class="forgot">Forgot password?</a>
      </div>
      <div class="pw-wrap">
        <input type="password" name="password" id="pw" placeholder="Your password" autocomplete="current-password" required />
        <button class="pw-toggle" onclick="togglePw()" type="button" aria-label="Toggle password">
          <svg id="eye" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <label class="remember">
    <input type="checkbox" name="remember" checked /> Keep me signed in for 30 days
  </label>

  <button type="submit" class="btn-submit">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
    </svg>
    Sign In
  </button>

</form>

<!-- also fix the "Create Account" button at the bottom of login.html -->
<!-- replace onclick="location.href='/register/'" with: -->
<button class="btn-create" onclick="location.href='{% url &quot;register&quot; %}'">
  Create your free account
  <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <path d="M5 12h14M12 5l7 7-7 7"/>
  </svg>
</button>
